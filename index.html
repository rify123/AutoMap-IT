  function buildMapNodes(){
    var nodes=[], lines=[], center={name:"Escaneo AutoMap IT",type:"Centro",x:42,y:42,cx:50,cy:47,cls:"server"};
    var servers=state.servers.length?state.servers:[["localhost","Servidor","Pendiente","-","Windows","Desconocido","Bajo",0,"Produccion"]];
    var topServers=servers.slice(0,4);
    var positions=[[42,5],[8,22],[75,22],[42,78]];
    for(var i=0;i<topServers.length;i++){
      var s=topServers[i], p=positions[i]||[10+i*18,70];
      var n={name:s[0],type:"Servidor",x:p[0],y:p[1],cx:p[0]+8,cy:p[1]+5,cls:/Alto|Crit/i.test(s[6])?"server risk":"server",title:s.join(" | ")};
      nodes.push(n);lines.push(mapLine(center,n));
    }
    var groups=[
      {rows:state.scripts,type:"Script",cls:"script",x:9,y:52,nameCol:0,serverCol:3},
      {rows:state.tasks,type:"Tarea",cls:"auto",x:31,y:52,nameCol:0,serverCol:1},
      {rows:state.services,type:"Servicio",cls:"service",x:56,y:52,nameCol:0,serverCol:6},
      {rows:state.credentials,type:"Credencial",cls:"cred",x:78,y:52,nameCol:0,serverCol:3},
      {rows:state.alerts,type:"Alerta",cls:"risk",x:78,y:76,nameCol:2,serverCol:3}
    ];
    nodes.push(center);
    for(var g=0;g<groups.length;g++){
      var group=groups[g], rows=(group.rows||[]).slice(0,3);
